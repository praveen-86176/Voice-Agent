<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARIA Assistant</title>
    <link rel="icon" href="data:," />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');
      
      :root {
        --bg-color: #0f172a;
        --panel-bg: rgba(30, 41, 59, 0.7);
        --border-color: rgba(255, 255, 255, 0.1);
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --user-msg: rgba(99, 102, 241, 0.2);
        --aria-msg: rgba(16, 185, 129, 0.15);
      }
      
      body {
        margin: 0;
        font-family: 'Outfit', system-ui, sans-serif;
        background: radial-gradient(circle at top left, #1e1b4b, var(--bg-color));
        color: var(--text-main);
        min-height: 100vh;
      }
      
      .container {
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
      }
      
      .grid {
        display: grid;
        grid-template-columns: 1.6fr 1fr;
        gap: 24px;
      }
      
      .panel {
        background: var(--panel-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
      }
      
      h1 {
        margin-top: 0;
        font-size: 1.6rem;
        font-weight: 500;
        background: linear-gradient(to right, #818cf8, #34d399);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        margin-bottom: 16px;
      }
      
      #chat {
        flex: 1;
        height: 400px;
        overflow-y: auto;
        border-radius: 12px;
        padding: 16px;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        gap: 12px;
        scrollbar-width: thin;
        scrollbar-color: var(--primary) transparent;
      }
      
      #chat::-webkit-scrollbar {
        width: 6px;
      }
      #chat::-webkit-scrollbar-thumb {
        background-color: var(--primary);
        border-radius: 10px;
      }
      
      .msg {
        padding: 12px 16px;
        border-radius: 14px;
        max-width: 80%;
        line-height: 1.5;
        font-size: 0.95rem;
        animation: fadeIn 0.3s ease-out forwards;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .user {
        align-self: flex-end;
        background: var(--user-msg);
        border: 1px solid rgba(99, 102, 241, 0.3);
        border-bottom-right-radius: 4px;
      }
      
      .aria {
        align-self: flex-start;
        background: var(--aria-msg);
        border: 1px solid rgba(16, 185, 129, 0.3);
        border-bottom-left-radius: 4px;
      }
      
      .composer {
        margin-top: 16px;
        display: flex;
        gap: 12px;
      }
      
      input {
        flex: 1;
        padding: 14px 18px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        background: rgba(15, 23, 42, 0.6);
        color: var(--text-main);
        font-family: inherit;
        font-size: 1rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
      }
      
      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      }
      
      button {
        padding: 12px 20px;
        border: none;
        border-radius: 12px;
        background: var(--primary);
        color: white;
        font-family: inherit;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      
      button:hover:not(:disabled) {
        background: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      }
      
      button:active:not(:disabled) {
        transform: translateY(0);
      }
      
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      
      .toolbar {
        margin-top: 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      
      .toolbar button {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        font-size: 0.85rem;
        padding: 8px 14px;
      }
      
      .toolbar button:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.1);
        box-shadow: none;
        transform: translateY(-1px);
      }
      
      #mic.listening {
        background: rgba(239, 68, 68, 0.2);
        border-color: rgba(239, 68, 68, 0.5);
        color: #fca5a5;
        animation: pulse 1.5s infinite;
      }
      
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
      }
      
      .todos {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 16px;
        flex: 1;
        overflow-y: auto;
        padding-right: 8px;
      }
      
      .todoRow {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.4);
        transition: transform 0.2s, background 0.2s;
      }
      
      .todoRow:hover {
        background: rgba(15, 23, 42, 0.7);
        transform: translateX(4px);
      }
      
      .todoTitle {
        flex: 1;
        font-weight: 400;
      }
      
      .pill {
        font-size: 0.75rem;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border-color);
        background: rgba(255, 255, 255, 0.05);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      
      .muted {
        color: var(--text-muted);
        font-size: 0.9rem;
      }
      
      #startOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      
      #startSessionBtn {
        font-size: 1.4rem;
        padding: 20px 48px;
        border-radius: 100px;
        background: linear-gradient(135deg, var(--primary), #8b5cf6);
        box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        letter-spacing: 0.5px;
        border: none;
      }
      
      #startSessionBtn:hover {
        transform: scale(1.05);
        box-shadow: 0 15px 40px rgba(99, 102, 241, 0.6);
      }
      
      .todoRow button {
        padding: 6px 12px;
        font-size: 0.8rem;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
      }
      
      .todoRow button:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      
      .todoRow button.delete-btn {
        background: rgba(239, 68, 68, 0.1);
        color: #fca5a5;
        border-color: rgba(239, 68, 68, 0.2);
      }
      
      .todoRow button.delete-btn:hover {
        background: rgba(239, 68, 68, 0.3);
      }
      
      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .container {
          margin: 20px auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="startOverlay">
      <button id="startSessionBtn">Tap to Start Session</button>
    </div>
    <div class="container">
      <div class="grid">
        <div class="panel">
          <h1>ARIA Assistant</h1>
          <div id="chat"></div>
          <div class="composer">
            <input id="message" placeholder="Type your message..." autocomplete="off" />
            <button id="send">Send</button>
          </div>
          <div class="toolbar">
            <button id="mic">Start Voice</button>
            <button id="speakToggle">Voice Reply: On</button>
            <button id="autoSendToggle">Auto-send Voice: On</button>
          </div>
        </div>

        <div class="panel">
          <h1>To‑Do List</h1>
          <div class="muted">Refresh to see latest tasks created from chat or voice.</div>
          <div class="toolbar">
            <button id="refreshTodos">Refresh</button>
            <button id="addQuick">Quick Add</button>
          </div>
          <div id="todos" class="todos"></div>
        </div>
      </div>
    </div>

    <script>
      const chat = document.getElementById("chat");
      const input = document.getElementById("message");
      const send = document.getElementById("send");
      const mic = document.getElementById("mic");
      const speakToggle = document.getElementById("speakToggle");
      const autoSendToggle = document.getElementById("autoSendToggle");
      const refreshTodos = document.getElementById("refreshTodos");
      const addQuick = document.getElementById("addQuick");
      const todosEl = document.getElementById("todos");
      let speakReplies = true;
      let autoSendVoice = true;
      let recognizing = false;
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null;
      let liveText = "";
      let liveSendTimer = null;

      function appendMessage(role, text) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function speakText(text) {
        if (!speakReplies || !("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 1.05;
        utter.pitch = 1;
        window.speechSynthesis.speak(utter);
      }

      async function sendMessage(overrideMessage) {
        const textToUse = typeof overrideMessage === "string" ? overrideMessage : input.value;
        const message = textToUse.trim();
        if (!message) return;
        appendMessage("user", message);
        input.value = "";
        send.disabled = true;
        mic.disabled = true;

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message }),
          });
          const data = await res.json();
          const reply = data.reply || "I hit an issue. Please try again.";
          appendMessage("aria", reply);
          speakText(reply);
        } catch (_err) {
          const reply = "I hit an issue. Please try again.";
          appendMessage("aria", reply);
          speakText(reply);
        } finally {
          send.disabled = false;
          mic.disabled = false;
          input.focus();
          loadTodos();
        }
      }

      function renderTodos(todos) {
        todosEl.innerHTML = "";
        if (!todos || todos.length === 0) {
          const div = document.createElement("div");
          div.className = "muted";
          div.textContent = "No tasks yet. Start adding some!";
          todosEl.appendChild(div);
          return;
        }

        for (const t of todos) {
          const row = document.createElement("div");
          row.className = "todoRow";

          const title = document.createElement("div");
          title.className = "todoTitle";
          title.textContent = t.title;

          const status = document.createElement("span");
          status.className = "pill";
          status.textContent = t.status || "pending";

          const doneBtn = document.createElement("button");
          doneBtn.textContent = "Done";
          doneBtn.onclick = async () => {
            await fetch("/api/todos/update", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ task_id: t.id, status: "done" }),
            });
            loadTodos();
          };

          const delBtn = document.createElement("button");
          delBtn.className = "delete-btn";
          delBtn.textContent = "Delete";
          delBtn.onclick = async () => {
            const ok = confirm(`Delete "${t.title}"?`);
            if (!ok) return;
            await fetch("/api/todos/delete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ task_id: t.id }),
            });
            loadTodos();
          };

          row.appendChild(title);
          row.appendChild(status);
          row.appendChild(doneBtn);
          row.appendChild(delBtn);
          todosEl.appendChild(row);
        }
      }

      async function loadTodos() {
        try {
          const res = await fetch("/api/todos");
          const data = await res.json();
          renderTodos(data.todos || []);
        } catch (_e) {
          renderTodos([]);
        }
      }

      refreshTodos.addEventListener("click", loadTodos);
      addQuick.addEventListener("click", async () => {
        const title = prompt("Task title?");
        if (!title) return;
        await fetch("/api/todos/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title }),
        });
        loadTodos();
      });

      send.addEventListener("click", () => sendMessage());
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      speakToggle.addEventListener("click", () => {
        speakReplies = !speakReplies;
        speakToggle.textContent = `Voice Reply: ${speakReplies ? "On" : "Off"}`;
      });

      autoSendToggle.addEventListener("click", () => {
        autoSendVoice = !autoSendVoice;
        autoSendToggle.textContent = `Auto-send Voice: ${autoSendVoice ? "On" : "Off"}`;
      });

      async function ensureMicPermission() {
        try {
          await navigator.mediaDevices.getUserMedia({ audio: true });
          return true;
        } catch (_err) {
          appendMessage("aria", "Microphone permission is blocked. Please allow mic access in your browser settings.");
          return false;
        }
      }

      function stopMic() {
        recognizing = false;
        mic.textContent = "Start Voice";
        mic.classList.remove("listening");
        try {
          recognition.stop();
        } catch (_e) {}
      }

      if (SpeechRecognition && navigator.mediaDevices?.getUserMedia) {
        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        recognition.continuous = true;

        recognition.onresult = (event) => {
          let fullText = "";
          for (let i = 0; i < event.results.length; i++) {
            fullText += event.results[i][0].transcript;
          }
          
          liveText = fullText.trim();
          input.value = liveText;

          if (autoSendVoice && liveText) {
            // Wait 1.5 seconds of silence before auto-sending
            if (liveSendTimer) clearTimeout(liveSendTimer);
            liveSendTimer = setTimeout(() => {
              const textToSend = input.value.trim();
              if (textToSend) {
                stopMic();
                sendMessage(textToSend);
              }
            }, 1500);
          }
        };

        recognition.onend = () => {
          stopMic();
        };

        recognition.onerror = (event) => {
          stopMic();
          const reason = event?.error ? ` (${event.error})` : "";
          appendMessage("aria", `I couldn't hear clearly, please try again${reason}.`);
        };

        mic.addEventListener("click", async () => {
          if (!recognizing) {
            const ok = await ensureMicPermission();
            if (!ok) return;
            recognizing = true;
            mic.textContent = "Listening...";
            mic.classList.add("listening");
            input.value = ""; // Clear input box on start
            try {
              recognition.start();
            } catch (_e) {}
          } else {
            stopMic();
          }
        });
      } else {
        mic.disabled = true;
        mic.textContent = "Voice Unsupported";
        appendMessage("aria", "Voice input needs Chrome or Edge with microphone permission.");
      }

      const startOverlay = document.getElementById("startOverlay");
      const startSessionBtn = document.getElementById("startSessionBtn");
      
      startSessionBtn.addEventListener("click", () => {
        startOverlay.style.opacity = "0";
        setTimeout(() => startOverlay.style.display = "none", 400); // Wait for fade out
        
        const welcome = "Hi, I’m ARIA. What would you like to do today?";
        appendMessage("aria", welcome);
        speakText(welcome);
        input.focus();
        loadTodos();
      });
    </script>
  </body>
</html>
