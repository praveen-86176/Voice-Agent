<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARIA Assistant</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1020;
        color: #f2f4ff;
      }
      .container {
        max-width: 1100px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 16px;
      }
      .panel {
        background: #121a33;
        border: 1px solid #28365f;
        border-radius: 14px;
        padding: 16px;
      }
      h1 {
        margin-top: 0;
        font-size: 1.3rem;
      }
      #chat {
        height: 420px;
        overflow-y: auto;
        border: 1px solid #2f406f;
        border-radius: 10px;
        padding: 12px;
        background: #0e1530;
      }
      .msg {
        margin: 10px 0;
        line-height: 1.45;
      }
      .user {
        color: #8fd3ff;
      }
      .aria {
        color: #c7ffbf;
      }
      .composer {
        margin-top: 12px;
        display: flex;
        gap: 10px;
      }
      .toolbar {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .todos {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .todoRow {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border: 1px solid #2f406f;
        border-radius: 10px;
        background: #0e1530;
      }
      .todoTitle {
        flex: 1;
      }
      .pill {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid #364b83;
        opacity: 0.9;
      }
      .muted {
        opacity: 0.8;
        font-size: 13px;
      }
      .listening {
        opacity: 0.9;
        font-style: italic;
      }
      input {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #364b83;
        background: #121b3d;
        color: #f2f4ff;
      }
      button {
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        background: #4b7cff;
        color: white;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="grid">
        <div class="panel">
          <h1>ARIA Assistant</h1>
          <div id="chat"></div>
          <div class="composer">
            <input id="message" placeholder="Type your message..." />
            <button id="send">Send</button>
          </div>
          <div class="toolbar">
            <button id="mic">Start Voice</button>
            <button id="speakToggle">Voice Reply: On</button>
            <button id="autoSendToggle">Auto-send Voice: On</button>
          </div>
        </div>

        <div class="panel">
          <h1>To‑Do List</h1>
          <div class="muted">Refresh to see latest tasks created from chat or voice.</div>
          <div class="toolbar">
            <button id="refreshTodos">Refresh</button>
            <button id="addQuick">Quick Add</button>
          </div>
          <div id="todos" class="todos"></div>
        </div>
      </div>
    </div>

    <script>
      const chat = document.getElementById("chat");
      const input = document.getElementById("message");
      const send = document.getElementById("send");
      const mic = document.getElementById("mic");
      const speakToggle = document.getElementById("speakToggle");
      const autoSendToggle = document.getElementById("autoSendToggle");
      const refreshTodos = document.getElementById("refreshTodos");
      const addQuick = document.getElementById("addQuick");
      const todosEl = document.getElementById("todos");
      let speakReplies = true;
      let autoSendVoice = true;
      let recognizing = false;
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null;
      let liveTranscriptEl = null;
      let liveText = "";
      let liveSendTimer = null;

      function appendMessage(role, text) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.textContent = `${role === "user" ? "You" : "ARIA"}: ${text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function setLiveTranscript(text) {
        if (!liveTranscriptEl) {
          liveTranscriptEl = document.createElement("div");
          liveTranscriptEl.className = "msg user";
          chat.appendChild(liveTranscriptEl);
        }
        liveTranscriptEl.textContent = text ? `You (listening): ${text}` : "";
        chat.scrollTop = chat.scrollHeight;
      }

      function speakText(text) {
        if (!speakReplies || !("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 1;
        utter.pitch = 1;
        window.speechSynthesis.speak(utter);
      }

      async function sendMessage(overrideMessage) {
        const message = (overrideMessage ?? input.value).trim();
        if (!message) return;
        appendMessage("user", message);
        input.value = "";
        send.disabled = true;
        mic.disabled = true;

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message }),
          });
          const data = await res.json();
          const reply = data.reply || "I hit an issue. Please try again.";
          appendMessage("aria", reply);
          speakText(reply);
        } catch (_err) {
          const reply = "I hit an issue. Please try again.";
          appendMessage("aria", reply);
          speakText(reply);
        } finally {
          send.disabled = false;
          mic.disabled = false;
          input.focus();
          loadTodos();
        }
      }
      function renderTodos(todos) {
        todosEl.innerHTML = "";
        if (!todos || todos.length === 0) {
          const div = document.createElement("div");
          div.className = "muted";
          div.textContent = "No tasks yet.";
          todosEl.appendChild(div);
          return;
        }

        for (const t of todos) {
          const row = document.createElement("div");
          row.className = "todoRow";

          const title = document.createElement("div");
          title.className = "todoTitle";
          title.textContent = t.title;

          const status = document.createElement("span");
          status.className = "pill";
          status.textContent = t.status || "pending";

          const doneBtn = document.createElement("button");
          doneBtn.textContent = "Done";
          doneBtn.onclick = async () => {
            await fetch("/api/todos/update", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ task_id: t.id, status: "done" }),
            });
            loadTodos();
          };

          const delBtn = document.createElement("button");
          delBtn.textContent = "Delete";
          delBtn.onclick = async () => {
            const ok = confirm(`Delete "${t.title}"?`);
            if (!ok) return;
            await fetch("/api/todos/delete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ task_id: t.id }),
            });
            loadTodos();
          };

          row.appendChild(title);
          row.appendChild(status);
          row.appendChild(doneBtn);
          row.appendChild(delBtn);
          todosEl.appendChild(row);
        }
      }

      async function loadTodos() {
        try {
          const res = await fetch("/api/todos");
          const data = await res.json();
          renderTodos(data.todos || []);
        } catch (_e) {
          renderTodos([]);
        }
      }

      refreshTodos.addEventListener("click", loadTodos);
      addQuick.addEventListener("click", async () => {
        const title = prompt("Task title?");
        if (!title) return;
        await fetch("/api/todos/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title }),
        });
        loadTodos();
      });

      send.addEventListener("click", sendMessage);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      speakToggle.addEventListener("click", () => {
        speakReplies = !speakReplies;
        speakToggle.textContent = `Voice Reply: ${speakReplies ? "On" : "Off"}`;
      });

      autoSendToggle.addEventListener("click", () => {
        autoSendVoice = !autoSendVoice;
        autoSendToggle.textContent = `Auto-send Voice: ${autoSendVoice ? "On" : "Off"}`;
      });

      async function ensureMicPermission() {
        try {
          await navigator.mediaDevices.getUserMedia({ audio: true });
          return true;
        } catch (_err) {
          appendMessage("aria", "Microphone permission is blocked. Please allow mic access in your browser settings.");
          return false;
        }
      }

      if (SpeechRecognition && navigator.mediaDevices?.getUserMedia) {
        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        recognition.continuous = true;

        recognition.onresult = (event) => {
          let interim = "";
          let finalText = "";
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const chunk = event.results[i]?.[0]?.transcript ?? "";
            if (event.results[i].isFinal) finalText += chunk;
            else interim += chunk;
          }
          liveText = (finalText || interim).trim();
          setLiveTranscript(liveText);
          input.value = liveText;

          if (autoSendVoice && finalText.trim()) {
            // Debounce a bit to avoid double-sends when final comes in quickly.
            if (liveSendTimer) clearTimeout(liveSendTimer);
            liveSendTimer = setTimeout(() => {
              const text = (finalText || liveText).trim();
              if (text) sendMessage(text);
              setLiveTranscript("");
              liveTranscriptEl = null;
            }, 250);
          }
        };

        recognition.onend = () => {
          recognizing = false;
          mic.textContent = "Start Voice";
          // Auto-restart to keep voice always-ready.
          if (recognizing) {
            try {
              recognition.start();
            } catch (_e) {}
          }
        };

        recognition.onerror = (event) => {
          recognizing = false;
          mic.textContent = "Start Voice";
          const reason = event?.error ? ` (${event.error})` : "";
          appendMessage("aria", `I couldn't hear clearly, please try again${reason}.`);
        };

        mic.addEventListener("click", async () => {
          if (!recognizing) {
            const ok = await ensureMicPermission();
            if (!ok) return;
            recognizing = true;
            mic.textContent = "Listening...";
            try {
              recognition.start();
            } catch (_e) {}
          } else {
            recognizing = false;
            mic.textContent = "Start Voice";
            setLiveTranscript("");
            liveTranscriptEl = null;
            try {
              recognition.stop();
            } catch (_e) {}
          }
        });
      } else {
        mic.disabled = true;
        mic.textContent = "Voice Unsupported";
        appendMessage("aria", "Voice input needs Chrome or Edge with microphone permission.");
      }

      const welcome = "Hi, I’m ARIA. What would you like to do today?";
      appendMessage("aria", welcome);
      speakText(welcome);
      input.focus();
      loadTodos();
    </script>
  </body>
</html>
